name: "Labels: PR"

on:
- pull_request_target

permissions:
  pull-requests: write
  issues: write
  contents: read

jobs:
  labeler:
    if: github.actor != 'IanComradeBot'
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
    - uses: actions/labeler@v5
      with:                # ADT Tweak by Schrodinger
        sync-labels: true  # Поправил auto-labels
