name: Publish Changelog

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: 'Commit SHA (short or full)'
        required: true
        type: string
        default: 'master'

jobs:
  publish:
    name: Publish Changelog to Discord
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get commit information
        id: commit
        run: |
          set -e

          FULL_HASH=$(git rev-parse ${{ github.event.inputs.commit_sha }})
          SHORT_HASH=$(git rev-parse --short $FULL_HASH)

          TITLE=$(git log -1 --format=%s $FULL_HASH)
          BODY=$(git log -1 --format=%b $FULL_HASH)

          AUTHOR=$(git log -1 --format=%an $FULL_HASH)
          DATE=$(git log -1 --format=%ad --date=format:'%Y-%m-%d %H:%M:%S' $FULL_HASH)

          # безопасная обрезка
          BODY=$(echo "$BODY" | head -c 3500)

          {
            echo "full_hash=$FULL_HASH"
            echo "short_hash=$SHORT_HASH"
            echo "title<<EOF"
            echo "$TITLE"
            echo "EOF"

            echo "body<<EOF"
            echo "$BODY"
            echo "EOF"

            echo "author=$AUTHOR"
            echo "date=$DATE"
            echo "url=https://github.com/${{ github.repository }}/commit/$FULL_HASH"
          } >> $GITHUB_OUTPUT

      - name: Detect commit type emoji
        id: emoji
        run: |
          TITLE="${{ steps.commit.outputs.title }}"

          case "$TITLE" in
            *"[FIX]"*) echo "emoji=🩹" >> $GITHUB_OUTPUT ;;
            *"[ADD]"*) echo "emoji=✨" >> $GITHUB_OUTPUT ;;
            *"[TWEAK]"*) echo "emoji=⚙️" >> $GITHUB_OUTPUT ;;
            *"[REMOVE]"*) echo "emoji=🗑️" >> $GITHUB_OUTPUT ;;
            *"[REFACTOR]"*) echo "emoji=♻️" >> $GITHUB_OUTPUT ;;
            *) echo "emoji=📝" >> $GITHUB_OUTPUT ;;
          esac

      - name: Send to Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.CHANGELOG_DISCORD_WEBHOOK }}
          TITLE: ${{ steps.commit.outputs.title }}
          BODY: ${{ steps.commit.outputs.body }}
          URL: ${{ steps.commit.outputs.url }}
          AUTHOR: ${{ steps.commit.outputs.author }}
          HASH: ${{ steps.commit.outputs.short_hash }}
          DATE: ${{ steps.commit.outputs.date }}
          EMOJI: ${{ steps.emoji.outputs.emoji }}

        run: |
          export LANG=C.UTF-8
          export LC_ALL=C.UTF-8

          jq -n \
            --arg emoji "$EMOJI" \
            --arg title "$TITLE" \
            --arg body "$BODY" \
            --arg url "$URL" \
            --arg author "$AUTHOR" \
            --arg hash "$HASH" \
            --arg date "$DATE" \
            '{
              embeds: [{
                title: ($emoji + " New Changelog"),
                color: 5814783,
                description: ("**" + $title + "**\n\n" + $body + "\n\n🔗 [View Commit](" + $url + ")"),
                footer: {
                  text: ($author + " | " + $hash + " • " + $date)
                }
              }]
            }' > payload.json

          curl -s -o response.txt -w "%{http_code}" \
            -H "Content-Type: application/json" \
            -d @payload.json \
            "$DISCORD_WEBHOOK"

          echo "Discord response:"
          cat response.txt