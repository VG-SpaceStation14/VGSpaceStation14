name: Publish Multiple Changelog

on:
  workflow_dispatch:
    inputs:
      commit_range:
        description: 'Commit range (e.g. abc..def) or comma-separated SHAs'
        required: true
        type: string
        default: 'HEAD~3..HEAD'
      title:
        description: 'Changelog title'
        required: false
        type: string
        default: 'New Changelog'

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # -----------------------------
      # GET COMMITS (SAFE OUTPUT)
      # -----------------------------
      - name: Get commit list
        id: commits
        run: |
          set -e

          INPUT="${{ github.event.inputs.commit_range }}"
          COMMITS=""

          if [[ "$INPUT" == *".."* ]]; then
            COMMITS=$(git rev-list --reverse "$INPUT" || true)
          else
            IFS=',' read -ra SHAS <<< "$INPUT"
            for sha in "${SHAS[@]}"; do
              sha=$(echo "$sha" | xargs)
              [ -z "$sha" ] && continue
              COMMITS+=$(git rev-parse "$sha")
              COMMITS+=$'\n'
            done
          fi

          # Убираем пустые строки, чтобы не было фантомных коммитов
          COMMITS=$(echo "$COMMITS" | sed '/^$/d')

          if [ -z "$COMMITS" ]; then
            echo "No commits found!"
            exit 1
          fi

          DELIM="EOF_$(date +%s%N)"
          {
            echo "commits<<$DELIM"
            printf "%s\n" "$COMMITS"
            echo "$DELIM"
          } >> "$GITHUB_OUTPUT"

      # -----------------------------
      # BUILD CHANGELOG
      # -----------------------------
      - name: Build changelog
        id: changelog
        run: |
          set -e

          # Читаем список коммитов из предыдущего шага
          RAW_COMMITS="${{ steps.commits.outputs.commits }}"
          
          CHANGELOG=""
          COUNT=0

          # Используем "Here-string" <<< чтобы избежать subshell (пайпа)
          while IFS= read -r HASH; do
            [ -z "$HASH" ] && continue

            SHORT=$(git rev-parse --short "$HASH")
            TITLE=$(git log -1 --format=%s "$HASH")

            case "$TITLE" in
              *"[FIX]"*) EMOJI="🩹" ;;
              *"[ADD]"*) EMOJI="✨" ;;
              *"[TWEAK]"*) EMOJI="⚙️" ;;
              *"[REMOVE]"*) EMOJI="🗑️" ;;
              *"[REFACTOR]"*) EMOJI="♻️" ;;
              *"[UPDATE]"*) EMOJI="📦" ;;
              *"[SECURITY]"*) EMOJI="🔒" ;;
              *"[PERFORMANCE]"*) EMOJI="⚡" ;;
              *"[DOCS]"*) EMOJI="📚" ;;
              *"[TEST]"*) EMOJI="🧪" ;;
              *) EMOJI="📝" ;;
            esac

            CHANGELOG+="${EMOJI} \`${SHORT}\` ${TITLE}"$'\n'
            COUNT=$((COUNT + 1))

          done <<< "$RAW_COMMITS"

          # Записываем результат
          {
            echo "entries<<EOF"
            printf "%s" "$CHANGELOG"
            echo "EOF"
            echo "count=$COUNT"
          } >> "$GITHUB_OUTPUT"

      # -----------------------------
      # SEND TO DISCORD
      # -----------------------------
      - name: Send to Discord
        env:
          WEBHOOK: ${{ secrets.CHANGELOG_DISCORD_WEBHOOK }}
          TITLE: ${{ github.event.inputs.title }}
          ENTRIES: ${{ steps.changelog.outputs.entries }}
          COUNT: ${{ steps.changelog.outputs.count }}
        run: |
          set -e

          # Discord лимит на описание в эмбеде - 4096, но лучше слать частями по 2000
          MAX=2000
          CHUNKS=()
          CUR=""

          # Читаем построчно ENTRIES и делим на части
          while IFS= read -r line; do
            if [ $(( ${#CUR} + ${#line} + 1 )) -gt $MAX ]; then
              CHUNKS+=("$CUR")
              CUR="$line"
            else
              [ -z "$CUR" ] && CUR="$line" || CUR+=$'\n'"$line"
            fi
          done <<< "$ENTRIES"
          [ -n "$CUR" ] && CHUNKS+=("$CUR")

          EMBEDS="[]"
          TOTAL=${#CHUNKS[@]}

          for i in "${!CHUNKS[@]}"; do
            PART=$((i+1))
            
            # Собираем JSON массив эмбедов с помощью jq
            EMBEDS=$(jq -n \
              --arg title "📢 $TITLE (Part $PART/$TOTAL)" \
              --arg desc "${CHUNKS[$i]}" \
              --arg footer "Total commits: $COUNT" \
              --argjson prev "$EMBEDS" \
              '
              $prev + [{
                title: $title,
                color: 5814783,
                description: $desc,
                footer: { text: $footer }
              }]
              ')
          done

          # Формируем финальный PAYLOAD
          PAYLOAD=$(jq -n --argjson embeds "$EMBEDS" '{embeds: $embeds}')
          echo "$PAYLOAD" > payload.json

          # Отправка
          HTTP=$(curl -s -o response.txt -w "%{http_code}" \
            -H "Content-Type: application/json" \
            -d @payload.json \
            "$WEBHOOK")

          echo "HTTP Response: $HTTP"
          if [ "$HTTP" -lt 200 ] || [ "$HTTP" -gt 299 ]; then
            echo "Error details:"
            cat response.txt
            exit 1
          fi