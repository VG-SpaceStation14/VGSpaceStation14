name: Publish Multiple Changelog

on:
  workflow_dispatch:
    inputs:
      commit_range:
        description: 'Commit range (e.g., "abc123..def456") or comma-separated SHAs'
        required: true
        type: string
        default: 'HEAD~3..HEAD'
      title:
        description: 'Changelog title (optional)'
        required: false
        type: string
        default: 'New Changelog'

jobs:
  publish:
    name: Publish Changelog to Discord
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # -----------------------------
      # COLLECT COMMITS SAFELY
      # -----------------------------
      - name: Get commit list
        id: commits
        run: |
          set -e

          INPUT="${{ github.event.inputs.commit_range }}"
          COMMITS=""

          if [[ "$INPUT" == *".."* ]]; then
            COMMITS=$(git rev-list --reverse "$INPUT")
          else
            IFS=',' read -ra SHAS <<< "$INPUT"
            for sha in "${SHAS[@]}"; do
              sha=$(echo "$sha" | xargs)
              COMMITS+=$(git rev-parse "$sha")
              COMMITS+=$'\n'
            done
          fi

          if [ -z "$COMMITS" ]; then
            echo "No commits found!"
            exit 1
          fi

          {
            echo "commits<<EOF"
            printf "%s" "$COMMITS"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      # -----------------------------
      # BUILD CHANGELOG
      # -----------------------------
      - name: Process commits and build changelog
        id: changelog
        run: |
          set -e

          COMMITS="${{ steps.commits.outputs.commits }}"

          CHANGELOG=""
          COUNT=0

          printf "%s" "$COMMITS" | while IFS= read -r FULL_HASH; do
            [ -z "$FULL_HASH" ] && continue

            SHORT_HASH=$(git rev-parse --short "$FULL_HASH")
            TITLE=$(git log -1 --format=%s "$FULL_HASH")

            case "$TITLE" in
              *"[FIX]"*) EMOJI="🩹" ;;
              *"[ADD]"*) EMOJI="✨" ;;
              *"[TWEAK]"*) EMOJI="⚙️" ;;
              *"[REMOVE]"*) EMOJI="🗑️" ;;
              *"[REFACTOR]"*) EMOJI="♻️" ;;
              *"[UPDATE]"*) EMOJI="📦" ;;
              *"[SECURITY]"*) EMOJI="🔒" ;;
              *"[PERFORMANCE]"*) EMOJI="⚡" ;;
              *"[DOCS]"*) EMOJI="📚" ;;
              *"[TEST]"*) EMOJI="🧪" ;;
              *) EMOJI="📝" ;;
            esac

            CHANGELOG+="${EMOJI} \`${SHORT_HASH}\` ${TITLE}"$'\n'
            COUNT=$((COUNT + 1))

          done

          {
            echo "entries<<EOF"
            printf "%s" "$CHANGELOG"
            echo "EOF"
            echo "count=$COUNT"
          } >> $GITHUB_OUTPUT

      # -----------------------------
      # SEND TO DISCORD
      # -----------------------------
      - name: Send to Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.CHANGELOG_DISCORD_WEBHOOK }}
          TITLE: ${{ github.event.inputs.title }}
          ENTRIES: ${{ steps.changelog.outputs.entries }}
          COUNT: ${{ steps.changelog.outputs.count }}
        run: |
          set -e

          MAX_DESC=2000
          CHUNKS=()
          CURRENT=""

          while IFS= read -r line; do
            if [ $(( ${#CURRENT} + ${#line} + 1 )) -gt $MAX_DESC ]; then
              CHUNKS+=("$CURRENT")
              CURRENT="$line"
            else
              CURRENT+=$'\n'"$line"
            fi
          done <<< "$ENTRIES"

          [ -n "$CURRENT" ] && CHUNKS+=("$CURRENT")

          EMBEDS="[]"

          for i in "${!CHUNKS[@]}"; do
            CHUNK="${CHUNKS[$i]}"
            PART=$((i+1))
            TOTAL=${#CHUNKS[@]}

            EMBEDS=$(jq -n \
              --arg title "📢 $TITLE (Part $PART/$TOTAL)" \
              --arg desc "$CHUNK" \
              --arg footer "Commits: $COUNT" \
              --argjson prev "$EMBEDS" \
              '
              $prev + [{
                title: $title,
                color: 5814783,
                description: $desc,
                footer: { text: $footer }
              }]
              ')
          done

          PAYLOAD=$(jq -n --argjson embeds "$EMBEDS" '{embeds: $embeds}')

          echo "$PAYLOAD" > payload.json

          echo "Sending to Discord..."
          HTTP_CODE=$(curl -s -o response.txt -w "%{http_code}" \
            -H "Content-Type: application/json" \
            -d @payload.json \
            "$DISCORD_WEBHOOK")

          echo "HTTP Code: $HTTP_CODE"
          cat response.txt

          if [ "$HTTP_CODE" -ne 204 ]; then
            echo "Failed to send webhook"
            exit 1
          fi