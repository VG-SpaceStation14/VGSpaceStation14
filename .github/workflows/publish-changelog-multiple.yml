name: Publish Multiple Changelog

on:
  workflow_dispatch:
    inputs:
      commit_range:
        description: 'Commit range (e.g. abc..def) or comma-separated SHAs'
        required: true
        type: string
        default: 'HEAD~3..HEAD'
      title:
        description: 'Changelog title'
        required: false
        type: string
        default: 'New Changelog'

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # -----------------------------
      # GET COMMITS (SAFE OUTPUT)
      # -----------------------------
      - name: Get commit list
        id: commits
        run: |
          set -e

          INPUT="${{ github.event.inputs.commit_range }}"
          COMMITS=""

          if [[ "$INPUT" == *".."* ]]; then
            COMMITS=$(git rev-list --reverse "$INPUT" || true)
          else
            IFS=',' read -ra SHAS <<< "$INPUT"
            for sha in "${SHAS[@]}"; do
              sha=$(echo "$sha" | xargs)
              COMMITS+=$(git rev-parse "$sha")
              COMMITS+=$'\n'
            done
          fi

          if [ -z "$COMMITS" ]; then
            echo "No commits found!"
            exit 1
          fi

          DELIM="EOF_$(date +%s%N)"

          {
            echo "commits<<$DELIM"
            printf "%s\n" "$COMMITS"
            echo "$DELIM"
          } >> "$GITHUB_OUTPUT"

      # -----------------------------
      # BUILD CHANGELOG
      # -----------------------------
      - name: Build changelog
        id: changelog
        run: |
          set -e

          COMMITS="${{ steps.commits.outputs.commits }}"

          CHANGELOG=""
          COUNT=0

          printf "%s" "$COMMITS" | while IFS= read -r HASH; do
            [ -z "$HASH" ] && continue

            SHORT=$(git rev-parse --short "$HASH")
            TITLE=$(git log -1 --format=%s "$HASH")

            case "$TITLE" in
              *"[FIX]"*) EMOJI="🩹" ;;
              *"[ADD]"*) EMOJI="✨" ;;
              *"[TWEAK]"*) EMOJI="⚙️" ;;
              *"[REMOVE]"*) EMOJI="🗑️" ;;
              *"[REFACTOR]"*) EMOJI="♻️" ;;
              *"[UPDATE]"*) EMOJI="📦" ;;
              *"[SECURITY]"*) EMOJI="🔒" ;;
              *"[PERFORMANCE]"*) EMOJI="⚡" ;;
              *"[DOCS]"*) EMOJI="📚" ;;
              *"[TEST]"*) EMOJI="🧪" ;;
              *) EMOJI="📝" ;;
            esac

            CHANGELOG+="${EMOJI} \`${SHORT}\` ${TITLE}"$'\n'
            COUNT=$((COUNT + 1))

          done

          {
            echo "entries<<EOF"
            printf "%s" "$CHANGELOG"
            echo "EOF"
            echo "count=$COUNT"
          } >> "$GITHUB_OUTPUT"

      # -----------------------------
      # SEND TO DISCORD
      # -----------------------------
      - name: Send to Discord
        env:
          WEBHOOK: ${{ secrets.CHANGELOG_DISCORD_WEBHOOK }}
          TITLE: ${{ github.event.inputs.title }}
          ENTRIES: ${{ steps.changelog.outputs.entries }}
          COUNT: ${{ steps.changelog.outputs.count }}
        run: |
          set -e

          MAX=2000
          CHUNKS=()
          CUR=""

          while IFS= read -r line; do
            if [ $(( ${#CUR} + ${#line} + 1 )) -gt $MAX ]; then
              CHUNKS+=("$CUR")
              CUR="$line"
            else
              CUR+=$'\n'"$line"
            fi
          done <<< "$ENTRIES"

          [ -n "$CUR" ] && CHUNKS+=("$CUR")

          EMBEDS="[]"

          for i in "${!CHUNKS[@]}"; do
            PART=$((i+1))
            TOTAL=${#CHUNKS[@]}

            EMBEDS=$(jq -n \
              --arg title "📢 $TITLE (Part $PART/$TOTAL)" \
              --arg desc "${CHUNKS[$i]}" \
              --arg footer "Commits: $COUNT" \
              --argjson prev "$EMBEDS" \
              '
              $prev + [{
                title: $title,
                color: 5814783,
                description: $desc,
                footer: { text: $footer }
              }]
              ')
          done

          PAYLOAD=$(jq -n --argjson embeds "$EMBEDS" '{embeds: $embeds}')

          echo "$PAYLOAD" > payload.json

          HTTP=$(curl -s -o response.txt -w "%{http_code}" \
            -H "Content-Type: application/json" \
            -d @payload.json \
            "$WEBHOOK")

          echo "HTTP: $HTTP"
          cat response.txt

          if [ "$HTTP" -ne 204 ]; then
            echo "Discord webhook failed"
            exit 1
          fi