- type: entity
  id: ADTOrganTajaranStomach
  parent: OrganAnimalStomach
  categories: [ HideSpawnMenu ]
  components:
  - type: Organ
    slotId: stomach # VG-Tweak
  - type: Stomach # VG-Tweak
  - type: SolutionContainerManager
    solutions:
      stomach:
        maxVol: 50
      food:
        maxVol: 0
        name: food
  - type: Metabolizer
    maxReagents: 3
    metabolizerTypes: [ Tajaran ]
    groups:
    - id: Food
    - id: Drink
    - id: Alcohol

- type: entity
  id: ADTOrganTajaranHeart
  parent: OrganAnimalHeart
  components:
  # VG-Tweak Start
  - type: Heart
  - type: Organ
    slotId: heart
  # VG-Tweak End
  - type: Metabolizer
    maxReagents: 2
    metabolizerTypes: [ Tajaran ]
    groups:
    - id: Medicine
    - id: Poison
    - id: Narcotic

- type: entity
  id: ADTOrganTajaranLiver
  parent: BaseAnimalOrgan
  name: tajaran liver
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    state: liver
  # VG-Tweak Start
  - type: Liver
  - type: Organ 
    slotId: liver
  # VG-Tweak End
  - type: Metabolizer
    maxReagents: 1
    metabolizerTypes: [ Tajaran ]
    groups:
    - id: Alcohol
      rateModifier: 0.1
  - type: Item
    size: Small
    heldPrefix: liver
  - type: Tag
    tags:
    - Meat
    - Organ
    - Liver
