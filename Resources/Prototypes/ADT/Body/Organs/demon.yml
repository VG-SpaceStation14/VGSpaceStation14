- type: entity
  id: ADTOrganDemonStomach
  parent: OrganAnimalStomach
  categories: [ HideSpawnMenu ]
  components:
  - type: Organ
    slotId: stomach # VG-Tweak
  - type: Stomach # VG-Tweak
  - type: SolutionContainerManager
    solutions:
      stomach:
        maxVol: 50
      food:
        maxVol: 0
        name: food

- type: entity
  id: ADTOrganDemonHeart
  parent: OrganAnimalHeart
  components:
  # VG-Tweak Start
  - type: Heart
  - type: Organ
    slotId: heart
  # VG-Tweak End
  - type: Metabolizer
    maxReagents: 2
    metabolizerTypes: [ Demon ]
    groups:
    - id: Medicine
    - id: Poison
    - id: Narcotic
