- type: entity
  id: ADTOrganVulpkaninStomach
  parent: OrganAnimalStomach
  categories: [ HideSpawnMenu ]
  components:
    - type: Stomach
    - type: SolutionContainerManager
      solutions:
        stomach:
          maxVol: 50.0
    - type: Metabolizer
      maxReagents: 4
      metabolizerTypes: [ Vulpkanin ]
      groups:
      - id: Food
        rateModifier: 1.0
      - id: Drink
        rateModifier: 1.2  # Вульпакины пьют быстрее?
      - id: Medicine
        rateModifier: 0.6  # Лекарства усваиваются хуже
      - id: Poison
        rateModifier: 0.7  # Яды тоже хуже усваиваются (иммунитет?)
      - id: Alcohol
        rateModifier: 0.2  # Очень плохо с алкоголем


- type: entity
  id: ADTOrganVulpkaninLiver
  parent: BaseAnimalOrgan
  name: liver
  #categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    state: liver
  - type: Organ
  - type: Metabolizer
    maxReagents: 1
    metabolizerTypes: [ Animal ]
    groups:
    - id: Alcohol
      rateModifier: 0.1

- type: entity
  id: ADTOrganVulpkaninHeart
  parent: OrganAnimalHeart
  components:
  - type: Metabolizer
    maxReagents: 2
    metabolizerTypes: [ Vulpkanin, Animal ]
    groups:
    - id: Medicine
    - id: Poison
    - id: Narcotic
