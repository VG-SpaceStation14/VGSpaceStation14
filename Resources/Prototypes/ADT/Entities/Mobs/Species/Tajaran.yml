- type: entity
  save: false
  name: Tajaran McHands
  parent: BaseMobSpeciesOrganic
  id: BaseMobTajaran
  abstract: true
  components:
    - type: HumanoidAppearance
      species: TajaranSpecies
      hideLayersOnEquip:
      - SnoutOverlay
      - Tail # VG-Tweak
      - HeadTop # VG-Tweak
    - type: Body
      prototype: Tajaran
      requiredLegs: 2
    - type: MobThresholds
      thresholds:
        0: Alive
        90: Critical
        200: Dead
    - type: RoarAccent
    - type: Hunger
    - type: Thirst
    - type: Icon
      sprite: ADT/Mobs/Species/Tajaran/parts.rsi
      state: tajaran_m
    - type: Damageable
      damageContainer: Biological
      damageModifierSet: Tajaran
    - type: MeleeWeapon
      soundHit:
        path: /Audio/Weapons/slash.ogg
      animation: WeaponArcClaw
      damage:
        types:
          Slash: 5
    - type: Sharp
      butcherDelayModifier: 2.0
    - type: Temperature
      heatDamageThreshold: 325
      coldDamageThreshold: 240
      currentTemperature: 310.15
      specificHeat: 46
      coldDamage:
        types:
          Cold : 0.2 #per second, scales with temperature & other constants
      heatDamage:
        types:
          Heat : 0.1 #per second, scales with temperature & other constants
    - type: MovementSpeedModifier
      baseWalkSpeed : 2.7
      baseSprintSpeed : 4.6
    - type: Fixtures
      fixtures:
        fix1:
          shape:
            !type:PhysShapeCircle
            radius: 0.35
          density: 145 #lower density
          restitution: 0.0
          mask:
            - MobMask
          layer:
            - MobLayer
    - type: SlowOnDamage
      speedModifierThresholds:
        42: 0.7
        60: 0.5
    - type: TemperatureSpeed
      thresholds:
        273: 0.8
        240: 0.6
        210: 0.4
    - type: Sprite
      netsync: false
      noRot: true
      drawdepth: Mobs
      scale: 0.9, 0.9
      layers:
      - map: [ "enum.HumanoidVisualLayers.Chest" ]
      - map: [ "enum.HumanoidVisualLayers.HeadTop" ]
      - map: [ "enum.HumanoidVisualLayers.Head" ]
      - map: [ "enum.HumanoidVisualLayers.Snout" ]
      - map: [ "enum.HumanoidVisualLayers.Eyes" ]
      - map: [ "enum.HumanoidVisualLayers.RArm" ]
      - map: [ "enum.HumanoidVisualLayers.LArm" ]
      - map: [ "enum.HumanoidVisualLayers.RLeg" ]
      - map: [ "enum.HumanoidVisualLayers.LLeg" ]
      - map: [ "underwearb" ]
      - map: [ "underweart" ]
      - map: [ "enum.HumanoidVisualLayers.LFoot" ]
      - map: [ "enum.HumanoidVisualLayers.RFoot" ]
      - map: [ "socks" ]
      - map: [ "jumpsuit" ]
      - map: [ "enum.HumanoidVisualLayers.LHand" ]
      - map: [ "enum.HumanoidVisualLayers.RHand" ]
      - map: [ "gloves" ]
      - map: [ "shoes" ]
      - map: [ "ears" ]
      - map: [ "eyes" ]
      - map: [ "belt" ]
      - map: [ "id" ]
      - map: [ "outerClothing" ]
      - map: [ "neck" ]
      - map: [ "back" ]
      - map: [ "enum.HumanoidVisualLayers.SnoutCover" ]
      - map: [ "enum.HumanoidVisualLayers.FacialHair" ]
      - map: [ "enum.HumanoidVisualLayers.Hair" ]
      - map: [ "enum.HumanoidVisualLayers.HeadSide" ]
      - map: [ "enum.HumanoidVisualLayers.Tail" ]
      - map: [ "mask" ]
      - map: [ "head" ]
      - map: [ "pocket1" ]
      - map: [ "pocket2" ]
      - map: [ "enum.HumanoidVisualLayers.Handcuffs" ]
        color: "#ffffff"
        sprite: Objects/Misc/handcuffs.rsi
        state: body-overlay-2
        visible: false
      - map: [ "clownedon" ]
        sprite: "Effects/creampie.rsi"
        state: "creampie_human"
        visible: false
    - type: Wagging
    - type: InteractionPopup
      successChance: 1
      interactSuccessString: petting-success-generic
      interactSuccessSound: /Audio/ADT/Felinid/cat_purr1.ogg
      messagePerceivedByOthers: petting-success-soft-floofy-others
      interactSuccessSpawn: EffectHearts
      interactDelay: 4
    - type: Vocal
      # maleScream: /Audio/Voice/Human/malescream_1.ogg
      # femaleScream: /Audio/Voice/Human/femalescream_2.ogg
      wilhelm: "/Audio/ADT/Felinid/cat_wilhelm.ogg"
      sounds:
        Male: MaleFelinid
        Female: FemaleFelinid
        Unsexed: MaleFelinid
    - type: LanguageSpeaker
      languages:
        GalacticCommon: Speak
        SikTaj: Speak
        CintaTaj: Speak
    - type: SizeAttributeWhitelist # Frontier
      tall: true
      tallscale: 0.95
      short: true
      shortscale: 0.85
    - type: Tag
      tags:
      - CanPilot
      - FootstepSound
      - DoorBumpOpener
      - AnomalyHost
      - ADTCatEmotes
    - type: Inventory
      femaleDisplacements:
        jumpsuit:
          sizeMaps:
            32:
              sprite: Corvax/Mobs/Species/displacement.rsi
              state: jumpsuit-female
        shoes:
          sizeMaps:
            32:
              sprite: Corvax/Mobs/Species/displacement.rsi
              state: shoes
        outerClothing:
          sizeMaps:
            32:
              sprite: Corvax/Mobs/Species/displacement.rsi
              state: jumpsuit
      displacements:
        jumpsuit:
          sizeMaps:
            32:
              sprite: Corvax/Mobs/Species/displacement.rsi
              state: jumpsuit
        shoes:
          sizeMaps:
            32:
              sprite: Corvax/Mobs/Species/displacement.rsi
              state: shoes
        outerClothing:
          sizeMaps:
            32:
              sprite: Corvax/Mobs/Species/displacement.rsi
              state: jumpsuit
    # VG-Tweak Start
    - type: FootprintEmitter
      leftBareFootState:
        - "footprint-left-bare-fluffy"
      rightBareFootState:
        - "footprint-right-bare-fluffy"
      shoeFootState:
        - "footprint-shoes-fluffy"
      pressureSuitFootState:
        - "footprint-suit-fluffy"
    # VG-Tweak End

