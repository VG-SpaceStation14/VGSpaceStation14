- type: job
  id: HeadOfSecurity
  name: job-name-hos
  description: job-description-hos
  playTimeTracker: JobHeadOfSecurity
  requireAdminNotify: true # Ganimed Rules Tweak
  requirements:
    - !type:RoleTimeRequirement
      role: JobWarden
      time: 10h # Ganimed-RoleTime
    - !type:RoleTimeRequirement
      role: JobDetective
      time: 1h # knowing how to use the tools is important
    - !type:RoleTimeRequirement
      role: JobSecurityOfficer
      time: 15h # Ganimed-RoleTime
    - !type:DepartmentTimeRequirement
      department: Security
      time: 30h # Ganimed-RoleTime
    - !type:OverallPlaytimeRequirement
      time: 50h # Ganimed-RoleTime
    - !type:TraitsRequirement # Ganimed-MRP: HoS undergoes medical examination
      inverted: true
      traits:
      - Pacifist
      - Blindness
      - ADTDeaf
      - Frail
    - !type:AgeRequirement # Ganimed-MRP
      requiredAge: 24
  # ADT Restrict Start
    - !type:SpeciesRequirement
      inverted: true
      species:
      - Resomi
      - Vox
      - Shadekin
  # ADT RESTRICT End
  weight: 10
  startingGear: HoSGear
  icon: "JobIconHeadOfSecurity"
  supervisors: job-supervisors-captain
  canBeAntag: false
  access:
  - HeadOfSecurity
  - Command
  - Brig
  - Security
  - Armory
  - Maintenance
  - External
  - Detective
  - Cryogenics

  components:
  - type: SimpleSkillComponent
    skillGroup: CommandSkills #VG-Tweak SkillsIntegration

  special:
  - !type:AddSkillGroupSpecial 
    group: CommandSkills #VG-Tweak SkillsIntegration
  - !type:AddImplantSpecial
    implants: [ MindShieldImplant ]
  - !type:AddComponentSpecial
    components:
      - type: CommandStaff
      # - type: PhantomTyranyTarget # ADT Phantom
      - type: AntagImmune # Ganimed-MRP: Loyalty implant
  - !type:AddComponentSpecial
    components:
      - type: CommandStaff
      # - type: PhantomTyranyTarget # ADT Phantom
      # ADT-Tweak-Start: метка персонала службы безопасности
      - type: SecurityStaff
      # ADT-Tweak-End

- type: startingGear
  id: HoSGear
  equipment:
    eyes: ClothingEyesGlassesSecurity
    id: HoSPDA #Ganimed-Tweak
    gloves: ClothingHandsGlovesCombat
    ears: ClothingHeadsetAltSecurity
  storage:
    back:
    - Flash
    - ADTtelescopicBaton #ADT-CustomADTLoadout
    - MagazinePistol

- type: chameleonOutfit
  id: HeadOfSecurityChameleonOutfit
  job: HeadOfSecurity
  hasMindShield: true
  equipment:
    mask: ClothingMaskGasSecurity
    neck: ClothingNeckCloakHos