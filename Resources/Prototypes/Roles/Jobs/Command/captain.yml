- type: job
  id: Captain
  name: job-name-captain
  description: job-description-captain
  playTimeTracker: JobCaptain
  requireAdminNotify: true # VG Rules Tweak
  requirements:
#    - !type:DepartmentTimeRequirement
#      department: Engineering
#      time: 14400 # 4 hours
#    - !type:DepartmentTimeRequirement
#      department: Medical
#      time: 14400 # 4 hours
#    - !type:DepartmentTimeRequirement
#      department: Science
#      time: 14400 # 4 hours
    - !type:RoleTimeRequirement
      role: JobHeadOfPersonnel
      time: 5h # VG-RoleTime
    - !type:DepartmentTimeRequirement
      department: Security
      time: 20h # VG-RoleTime
    - !type:DepartmentTimeRequirement
      department: Command
      time: 25h # VG-RoleTime
    - !type:OverallPlaytimeRequirement
      time: 100h # VG-RoleTime
    - !type:TraitsRequirement # VG-MRP: Captain must be proficient in communication
      inverted: true
      traits:
#     - Monolingual
      - Muted
      - Deaf
  # ADT Restrict Start
    - !type:SpeciesRequirement
      inverted: true
      species:
      - Resomi
      - Vox
  # ADT RESTRICT End
    - !type:AgeRequirement # VG-MRP
      requiredAge: 24
  weight: 20
  startingGear: CaptainGear
  icon: "JobIconCaptain"
  joinNotifyCrew: true
  supervisors: job-supervisors-centcom
  canBeAntag: false
  accessGroups:
  - ADTAccessCaptain #ADT-tweak - полный доступ ко всем станционным дверям, кроме ЦК и ОСЩ
  
  special:
  - !type:AddSkillGroupSpecial 
    group: CommandSkills #VG-Tweak SkillsIntegration
  - !type:AddImplantSpecial
    implants: [ MindShieldImplant ]
  - !type:AddComponentSpecial
    components:
      - type: CommandStaff
      # - type: PhantomTyranyTarget # ADT Phantom
      - type: AntagImmune # VG-MRP: Loyalty implant

