- type: entity
  parent: Clothing
  id: IDCardStandard
  name: identification card
  description: A card necessary to access various areas aboard the station.
  abstract: true
  components:
  # ADT added start
  - type: EmitSoundOnPickup
    sound:
      path: /Audio/ADT/Items/Handling/card_pickup.ogg
      params:
        volume: -5
  - type: EmitSoundOnDrop
    sound:
      path: /Audio/ADT/Items/Handling/card_drop.ogg
      params:
        volume: -5
  - type: EmitSoundOnLand
    sound:
      path: /Audio/ADT/Items/Handling/card_drop.ogg
      params:
        volume: -5
  # ADT added end
  # VG-Start
  - type: Sprite
    sprite: &id-rsi _VG/Objects/Misc/id_cards.rsi
  - type: Clothing
    slots:
    - idcard
    sprite: _VG/Objects/Misc/id_cards.rsi
  # VG-End
  - type: Item
    size: Small
    heldPrefix: default
    storedRotation: -90
  - type: Access
  - type: IdCard
  - type: StationRecordKeyStorage
  - type: Tag
    tags:
    - DoorBumpOpener
    - WhitelistChameleon
    - WhitelistChameleonIdCard
  - type: StealTarget
    stealGroup: IDCard
  - type: NanoChatCard # ADT-tweak: Наночат
  - type: MiningPoints # ADT-Tweak

#IDs with layers

- type: entity
  parent: IDCardStandard
  id: PassengerIDCard
  name: passenger ID card
  components:
  # VG-Start
  - type: Sprite
    sprite: _VG/Objects/Misc/id_cards.rsi
    layers:
    - state: default
    - sprite: &icon-rsi Interface/Misc/job_icons.rsi
      offset: &icon-offset -0.19, 0
      state: Passenger
  # VG-End
  - type: PresetIdCard
    job: Passenger

