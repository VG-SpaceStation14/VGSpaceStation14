- type: entity
  name: nuclear authentication disk
  parent: [BaseItem, BaseGrandTheftContraband]
  id: NukeDisk
  description: A nuclear auth disk, capable of arming a nuke if used along with a code. Note from nanotrasen reads "THIS IS YOUR MOST IMPORTANT POSESSION, SECURE DAT FUKKEN DISK!"
  components:
  # VG-Tweak Start
  - type: EmitSoundOnPickup
    sound:
      path: /Audio/_VG/Items/handling/disk_pickup.ogg
      params:
        volume: -7
  - type: EmitSoundOnDrop
    sound:
      path: /Audio/_VG/Items/handling/disk_drop.ogg
      params:
        volume: -7
  - type: EmitSoundOnLand
    sound:
      path: /Audio/_VG/Items/handling/disk_drop.ogg
      params:
        volume: -7
  # VG-Tweak End
  - type: NukeDisk
  - type: SpecialRespawn
    prototype: NukeDisk
  - type: Sprite
    sprite: ADT/Objects/Misc/nukedisk.rsi # ADT-Tweak Objects/Misc/nukedisk.rsi
    state: icon
  - type: StaticPrice
    price: 2000
  - type: CargoSellBlacklist
  - type: ArrivalsBlacklist
  - type: WarpPoint
    follow: true
    location: nuke disk
    blacklist:
      tags:
      - GhostOnlyWarp
  - type: Tag
    tags:
    - HighRiskItem
    - GhostOnlyWarp
  - type: StealTarget
    stealGroup: NukeDisk
  - type: SupermatterImmune #ADT-Tweak

