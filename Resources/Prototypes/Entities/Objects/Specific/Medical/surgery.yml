# Base

- type: entity
  parent: BaseItem
  id: BaseToolSurgery
  abstract: true
  components:
  - type: Sprite
  - type: StaticPrice
    price: 20
  - type: Tag
    tags:
    - SurgeryTool
  - type: SurgeryTool

# Cautery

- type: entity
  name: cautery
  id: Cautery
  parent: BaseToolSurgery
  description: A surgical tool used to cauterize open wounds.
  components:
  - type: Sprite
    sprite: Objects/Specific/Medical/Surgery/cautery.rsi
    state: cautery
  - type: Item
    sprite: Objects/Specific/Medical/Surgery/cautery.rsi
    storedRotation: 90
  - type: MeleeWeapon
    damage:
       types:
        Heat: 5
    soundHit:
      path: /Audio/Effects/lightburn.ogg
  - type: SurgeryTool
    startSound:
      path: /Audio/_VG/Medical/Surgery/cautery1.ogg
    endSound:
      path: /Audio/_VG/Medical/Surgery/cautery2.ogg
  - type: Cautery
  - type: Tag
    tags:
    - SurgeryTool
    - Cautery

# Drill

- type: entity
  name: drill
  id: Drill
  parent: BaseToolSurgery
  description: A surgical drill for making holes into hard material.
  components:
  - type: Sprite
    sprite: Objects/Specific/Medical/Surgery/drill.rsi
    state: drill
  - type: Item
    sprite: Objects/Specific/Medical/Surgery/drill.rsi
    shape:
    - 0,0,1,0
    - 1,1,1,1
  - type: MeleeWeapon
    damage:
      types:
        Piercing: 10
    soundHit:
      path: /Audio/Items/drill_hit.ogg
  - type: StaticPrice
    price: 40
  - type: SurgeryTool
    startSound:
      path: /Audio/_VG/Medical/Surgery/saw.ogg
  - type: Drill
  - type: Tag
    tags:
    - SurgeryTool
    - Drill

# Scalpel

- type: entity
  name: scalpel
  id: Scalpel
  parent: BaseToolSurgery
  description: A surgical tool used to make incisions into flesh.
  components:
  - type: Sharp
    butcherDelayModifier: 1.5
  - type: Tool
    qualities:
    - Slicing
    speedModifier: 0.66
  - type: Utensil
    types:
      - Knife
  - type: Sprite
    sprite: Objects/Specific/Medical/Surgery/scalpel.rsi
    state: scalpel
  - type: Item
    sprite: Objects/Specific/Medical/Surgery/scalpel.rsi
    storedRotation: 90
  - type: MeleeWeapon
    wideAnimationRotation: 90
    swingLeft: true
    attackRate: 1.5
    damage:
      types:
        Slash: 8
    soundHit:
      path: /Audio/Weapons/bladeslice.ogg
  - type: SurgeryTool
    startSound:
      path: /Audio/_VG/Medical/Surgery/scalpel1.ogg
    endSound:
      path: /Audio/_VG/Medical/Surgery/scalpel2.ogg
  - type: Scalpel
  - type: Tag
    tags:
    - SurgeryTool
    - Scalpel

- type: entity
  name: shiv
  id: ScalpelShiv
  parent: Scalpel
  description: A pointy piece of glass, abraded to an edge and wrapped in tape for a handle.
  components:
  - type: Sprite
    state: shiv
  - type: Item
    heldPrefix: shiv

- type: entity
  name: advanced scalpel
  id: ScalpelAdvanced
  parent: Scalpel
  description: Made of more expensive materials, sharper and generally more reliable.
  components:
  - type: Sprite
    state: advanced
  - type: Item
    heldPrefix: advanced
  - type: MeleeWeapon
    damage:
      types:
        Slash: 12
  - type: Scalpel
    speed: 1.25

- type: entity
  name: laser scalpel
  id: ScalpelLaser
  parent: Scalpel
  description: A scalpel which uses a directed laser to slice instead of a blade.
  components:
  - type: Sprite
    state: laser
  - type: Item
    heldPrefix: laser
  - type: Scalpel
    speed: 1.5
  - type: Tag
    tags:
    - SurgeryTool
    - ScalpelLaser

# Retractor

- type: entity
  name: retractor
  id: Retractor
  parent: BaseToolSurgery
  description: A surgical tool used to hold open incisions.
  components:
  - type: Sprite
    sprite: Objects/Specific/Medical/Surgery/scissors.rsi
    state: retractor
  - type: Item
    sprite: Objects/Specific/Medical/Surgery/scissors.rsi
    storedRotation: 90
  - type: SurgeryTool
    startSound:
      path: /Audio/_VG/Medical/Surgery/retractor1.ogg
    endSound:
      path: /Audio/_VG/Medical/Surgery/retractor2.ogg
  - type: Retractor
  - type: Tag
    tags:
    - SurgeryTool
    - Retractor

# Hemostat

- type: entity
  name: hemostat
  id: Hemostat
  parent: BaseToolSurgery
  description: A surgical tool used to compress blood vessels to prevent bleeding.
  components:
  - type: Sprite
    sprite: Objects/Specific/Medical/Surgery/scissors.rsi
    state: hemostat
  - type: Item
    heldPrefix: hemostat
    sprite: Objects/Specific/Medical/Surgery/scissors.rsi
    storedRotation: 90
  - type: SurgeryTool
    startSound:
      path: /Audio/_VG/Medical/Surgery/retractor1.ogg
    endSound:
      path: /Audio/_VG/Medical/Surgery/hemostat1.ogg
  - type: Hemostat
  - type: Tweezers
  - type: Tending
  - type: Tag
    tags:
    - SurgeryTool
    - Hemostat

# Bone setter

- type: entity
  parent: BaseToolSurgery
  id: BoneSetter
  name: bone setter
  description: Used for setting bones back into place.
  components:
  - type: Sprite
    sprite: Objects/Specific/Medical/Surgery/bonesetter.rsi
    state: bonesetter
  - type: Item
    sprite: Objects/Specific/Medical/Surgery/bonesetter.rsi
  - type: BoneSetter
  - type: Tag
    tags:
    - SurgeryTool
    - BoneSetter

# Bone Gel

- type: entity
  parent: BaseToolSurgery
  id: BoneGel
  name: bottle of bone gel
  description: A container for bone gel that often needs to be refilled from a specialized machine.
  components:
  - type: Sprite
    sprite: Objects/Specific/Medical/Surgery/bone_gel.rsi
    state: bone-gel
  - type: BoneGel

# Saws

- type: entity
  name: metal saw
  id: Saw
  parent: BaseToolSurgery
  description: For cutting wood and other objects to pieces. Or sawing bones, in case of emergency.
  components:
  - type: Sharp
  - type: Utensil
    types:
      - Knife
  - type: Sprite
    sprite: Objects/Specific/Medical/Surgery/saw.rsi
    state: saw
  - type: Item
    size: Normal
    sprite: Objects/Specific/Medical/Surgery/saw.rsi
    storedRotation: 90
  - type: Tool
    qualities:
      - Sawing
    speedModifier: 1.0
  - type: MeleeWeapon
    attackRate: 0.75
    range: 1.35
    damage:
      types:
        Blunt: 2.5
        Slash: 6.5
    angle: 20
  - type: BoneSaw

- type: entity
  name: choppa
  id: SawImprov
  parent: Saw
  description: A wicked serrated blade made of whatever nasty sharp things you could find.
  components:
  - type: Sprite
    state: improv
  - type: Item
    size: Small
    heldPrefix: improv
  - type: MeleeWeapon
    damage:
      groups:
        Brute: 10
    soundHit:
      path: /Audio/Weapons/bladeslice.ogg
  - type: Tool
    qualities:
      - Sawing
    speedModifier: 0.5
  - type: BoneSaw
    speed: 0.5

- type: entity
  name: circular saw
  id: SawElectric
  parent: Saw
  description: For heavy duty cutting.
  components:
  - type: Sprite
    sprite: Objects/Specific/Medical/Surgery/saw.rsi
    state: electric
  - type: Item
    size: Normal
    sprite: Objects/Specific/Medical/Surgery/saw.rsi
    heldPrefix: electric
  - type: MeleeWeapon
    damage:
      groups:
        Brute: 15
    soundHit:
      path: /Audio/Items/drill_hit.ogg
  - type: Tool
    qualities:
      - Sawing
    speedModifier: 1.5
  - type: BoneSaw
    speed: 1.5
  - type: Tag
    tags:
    - SurgeryTool
    - SawElectric

- type: entity
  name: advanced circular saw
  id: SawAdvanced
  parent: [ SawElectric, BaseSyndicateContraband ]
  description: Interdyne's state-of-the-art surgical saw.
  components:
  - type: Sprite
    state: advanced
  - type: Item
    heldPrefix: advanced
  - type: MeleeWeapon
    attackRate: 1.5
  - type: Tool
    qualities:
      - Sawing
    speedModifier: 2.0
  - type: BoneSaw
    speed: 2