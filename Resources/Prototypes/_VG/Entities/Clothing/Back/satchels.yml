#VG-add-start: two-sided satchels
- type: entity 
  abstract: true
  id: ClothingBackpackSatchelFoldableBase
  components:
  - type: Foldable 
    canFoldInsideContainer: true
    unfoldVerbText: holster-unfold-verb-text
    foldVerbText: holster-fold-verb-text
  - type: FoldableClothing
    foldedEquippedPrefix: mirrored # don't forget to add the mirrored sprite in rsi for ALL new satchels
#VG-add-end

