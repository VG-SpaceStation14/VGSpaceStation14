  - type: Sprite
    sprite: _VG/Clothing/Back/Satchels/white_captain_satchel.rsi

- type: entity
  parent: [ClothingBackpackSatchel , ClothingBackpackSatchelFoldableBase] #VG-Tweak (two-sided satchels)
