- type: entity
  id: BigGlassAirlockBase
  parent: AirlockGlass
  name: big glass airlock
  description: It looks like a regular airlock... But it's very wide.
  suffix: 3 tiles wide airlock
  categories: [ HideSpawnMenu ]
  components:
  - type: Transform
    noRot: false
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-1.49,-0.49,1.49,0.49"
        density: 100
        mask:
        - FullTileMask
        layer:
        - GlassAirlockLayer
  - type: Sprite
    snapCardinals: false
    offset: 0,0

- type: entity
  id: BigExternalAirlockGlass
  parent: [BigGlassAirlockBase, AirlockExternalGlass]
  name: big external glass airlock
  components:
  - type: Sprite
    sprite: _VG/Structures/Doors/Airlocks/Glass/big_external_glass_lua.rsi

- type: entity
  id: BigMedicalAirlockGlass
  parent: [BigGlassAirlockBase, AirlockGlass]
  name: big medical glass airlock
  components:
  - type: Sprite
    sprite: _VG/Structures/Doors/Airlocks/Glass/big_medical_glass_lua.rsi

- type: entity
  id: BigAirlockGlass
  parent: [BigGlassAirlockBase, AirlockGlass]
  name: big glass airlock
  components:
  - type: Sprite
    sprite: _VG/Structures/Doors/Airlocks/Glass/big_glass_lua.rsi

- type: entity
  id: MediumGlassAirlockBase
  parent: AirlockGlass
  name: medium glass airlock
  description: It looks like a regular airlock... But it's quite wide.
  suffix: 2 tiles wide airlock
  categories: [ HideSpawnMenu ]
  components:
  - type: Transform
    noRot: false
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.49,-0.49,1.49,0.49"
        density: 100
        mask:
        - FullTileMask
        layer:
        - GlassAirlockLayer
  - type: Sprite
    snapCardinals: false
    offset: 0.5,0

- type: entity
  id: MediumMedicalAirlockGlass
  parent: [MediumGlassAirlockBase, AirlockGlass]
  name: medium medical glass airlock
  components:
  - type: Sprite
    sprite: _VG/Structures/Doors/Airlocks/Glass/medium_medical_glass_lua.rsi

- type: entity
  id: AirlockGlassDouble
  parent: AirlockGlass
  name: double glass airlock
  description: It opens, it closes, it maybe crushes you, and it's bigger than normal.
  components:
  - type: Sprite
    sprite: _VG/Structures/Doors/Airlocks/Glass/double_glass_airlock.rsi
    snapCardinals: false
    offset: 0.5,0
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.49,-0.49,1.49,0.49" # don't want this colliding with walls or they won't close
        density: 100
        mask:
        - FullTileMask
        layer: #removed opaque from the layer, allowing lasers to pass through glass airlocks
        - GlassAirlockLayer
