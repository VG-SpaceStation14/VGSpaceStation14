- type: entity
  parent: BaseItem 
  id: BaseSimpleSkillBook
  abstract: true
  components:
  - type: SimpleSkillBook
    soundStart: /Audio/_VG/SimplSkill/book1.ogg
    soundEnd: /Audio/_VG/SimplSkill/book2.ogg
  - type: Sprite
    sprite: Objects/Misc/books.rsi
  - type: Item
  - type: Tag
    tags:
    - Book
  - type: MeleeWeapon
    soundHit:
      collection: Punch
    damage:
      types:
        Blunt: 1
  - type: DamageOtherOnHit
    damage:
      types:
        Blunt: 1


- type: entity
  parent: BaseSimpleSkillBook
  id: SimpleSkillBookPiloting
  name: книга пилотирования
  description: Обучает управлению шаттлом
  components:
  - type: Sprite
    layers:
    - state: paper
    - state: cover_base
      color: "#2d3a7e"
    - state: decor_wingette
      color: "#4a5a9e"
    - state: icon_stars  
      color: "#ffd700"
    - state: overlay_null
  - type: SimpleSkillBook
    teachesSkill: Piloting

