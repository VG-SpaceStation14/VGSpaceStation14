# Книги навыков
- type: entity
  parent: BaseItem
  id: SimpleSkillBookPiloting
  name: книга пилотирования
  description: Обучает управлению шаттлом
  components:
  - type: Sprite
    sprite: Objects/Misc/books.rsi
    layers:
    - state: paper
    - state: cover_base
      color: "#2d3a7e"
  - type: Item
  - type: SimpleSkillBook
    teachesSkill: Piloting
    soundStart: /Audio/_VG/SimplSkill/book1.ogg
    soundEnd: /Audio/_VG/SimplSkill/book2.ogg

